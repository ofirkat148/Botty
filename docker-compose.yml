services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
      secrets:
        - botty_resolv_conf
    image: botty-app:local
    restart: unless-stopped
    network_mode: host
    depends_on:
      ollama:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      NODE_OPTIONS: --dns-result-order=ipv4first
      NODE_EXTRA_CA_CERTS: /etc/ssl/certs/ca-certificates.crt
      npm_config_cafile: /etc/ssl/certs/ca-certificates.crt
      HOST: 127.0.0.1
      PORT: 5000
      DATABASE_URL: ${DATABASE_URL_CONTAINER:-postgresql://botty_user:botty_pass@127.0.0.1:5432/botty_db}
      LOCAL_LLM_URL: ${LOCAL_LLM_URL_CONTAINER:-http://127.0.0.1:11435}
    volumes:
      - /run/systemd/resolve/resolv.conf:/etc/resolv.conf:ro
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >-
          fetch('http://127.0.0.1:5000/api/health').then((response) => {
            if (!response.ok) {
              process.exit(1);
            }
          }).catch(() => process.exit(1));
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 180s

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    network_mode: host
    environment:
      OLLAMA_HOST: 127.0.0.1:11435
    volumes:
      - /var/snap/ollama/common:/root/.ollama
      - /run/systemd/resolve/resolv.conf:/etc/resolv.conf:ro
    healthcheck:
      test:
        - CMD
        - ollama
        - list
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    network_mode: host
    command:
      - postgres
      - -c
      - listen_addresses=127.0.0.1
    environment:
      POSTGRES_USER: botty_user
      POSTGRES_PASSWORD: botty_pass
      POSTGRES_DB: botty_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botty_user -d botty_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres_data:

secrets:
  botty_resolv_conf:
    file: /run/systemd/resolve/resolv.conf
