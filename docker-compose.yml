services:
  app:
    image: ghcr.io/ofirkat148/botty:main
    restart: unless-stopped
    network_mode: host
    depends_on:
      ollama:
        condition: service_healthy
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      NODE_OPTIONS: --dns-result-order=ipv4first
      NODE_EXTRA_CA_CERTS: /etc/ssl/certs/ca-certificates.crt
      npm_config_cafile: /etc/ssl/certs/ca-certificates.crt
      HOST: 127.0.0.1
      PORT: 5000
      DATABASE_PATH: /app/data/botty.db
      LOCAL_LLM_URL: ${LOCAL_LLM_URL_CONTAINER:-http://127.0.0.1:11435}
    volumes:
      - /run/systemd/resolve/resolv.conf:/etc/resolv.conf:ro
      - ./data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >-
          fetch('http://127.0.0.1:5000/api/health').then((response) => {
            if (!response.ok) {
              process.exit(1);
            }
          }).catch(() => process.exit(1));
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 180s

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    network_mode: host
    environment:
      OLLAMA_HOST: 127.0.0.1:11435
    volumes:
      - /var/snap/ollama/common:/root/.ollama
      - /run/systemd/resolve/resolv.conf:/etc/resolv.conf:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        - CMD
        - ollama
        - list
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes: {}

secrets:
  botty_resolv_conf:
    file: /run/systemd/resolve/resolv.conf
