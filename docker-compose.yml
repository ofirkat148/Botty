services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: botty_user
      POSTGRES_PASSWORD: botty_pass
      POSTGRES_DB: botty_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botty_user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
