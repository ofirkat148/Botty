services:
  app:
    image: node:20
    working_dir: /app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 5000
      DATABASE_URL: postgresql://botty_user:botty_pass@postgres:5432/botty_db
      LOCAL_LLM_URL: ${LOCAL_LLM_URL_CONTAINER:-http://host.docker.internal:11434}
    command:
      - sh
      - -lc
      - >-
        mkdir -p node_modules &&
        echo '[botty] startup: configuring npm' &&
        npm config set fetch-timeout 120000 &&
        npm config set fetch-retry-mintimeout 20000 &&
        npm config set fetch-retry-maxtimeout 120000 &&
        npm config set fetch-retries 5 &&
        lockfile_hash="$$(sha256sum package-lock.json | awk '{print $$1}')" &&
        cached_hash="$$(cat node_modules/.botty-package-lock.sha256 2>/dev/null || true)" &&
        if [ ! -x node_modules/.bin/vite ] || [ ! -x node_modules/.bin/tsx ] || [ "$$lockfile_hash" != "$$cached_hash" ]; then
          echo '[botty] startup: installing dependencies' &&
          npm install --prefer-offline --no-audit &&
          printf '%s' "$$lockfile_hash" > node_modules/.botty-package-lock.sha256 ;
        else
          echo '[botty] startup: reusing cached dependencies' ;
        fi &&
        echo '[botty] startup: building frontend' &&
        npm run build &&
        echo '[botty] startup: launching server' &&
        exec npm run start
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - botty_node_modules:/app/node_modules
      - botty_npm_cache:/root/.npm

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: botty_user
      POSTGRES_PASSWORD: botty_pass
      POSTGRES_DB: botty_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botty_user -d botty_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  botty_node_modules:
  botty_npm_cache:
