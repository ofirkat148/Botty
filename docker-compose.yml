services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 5000
      DATABASE_URL: postgresql://botty_user:botty_pass@postgres:5432/botty_db
      LOCAL_LLM_URL: ${LOCAL_LLM_URL_CONTAINER:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5000:5000"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: botty_user
      POSTGRES_PASSWORD: botty_pass
      POSTGRES_DB: botty_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botty_user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
