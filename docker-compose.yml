services:
  app:
    image: node:20
    working_dir: /app
    restart: unless-stopped
    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      NODE_OPTIONS: --dns-result-order=ipv4first
      NODE_EXTRA_CA_CERTS: /etc/ssl/certs/ca-certificates.crt
      npm_config_cafile: /etc/ssl/certs/ca-certificates.crt
      HOST: 0.0.0.0
      PORT: 5000
      DATABASE_URL: postgresql://botty_user:botty_pass@127.0.0.1:5432/botty_db
      LOCAL_LLM_URL: ${LOCAL_LLM_URL_CONTAINER:-http://127.0.0.1:11434}
    command:
      - sh
      - /app/ops/container-start.sh
    volumes:
      - .:/app
      - botty_node_modules:/app/node_modules
      - botty_npm_cache:/root/.npm
      - /run/systemd/resolve/resolv.conf:/etc/resolv.conf:ro
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >-
          fetch('http://127.0.0.1:5000/api/health').then((response) => {
            if (!response.ok) {
              process.exit(1);
            }
          }).catch(() => process.exit(1));
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 180s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: botty_user
      POSTGRES_PASSWORD: botty_pass
      POSTGRES_DB: botty_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botty_user -d botty_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  botty_node_modules:
  botty_npm_cache:
