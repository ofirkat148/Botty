apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: botty
data:
  NODE_ENV: "production"
  PORT: "5000"

---
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: botty
type: Opaque
stringData:
  DATABASE_URL: "postgresql://botty_user:botty_pass@postgres:5432/botty_db"
  JWT_SECRET: "your-super-secret-jwt-key"  # Change this!
  GEMINI_API_KEY: ""  # Optional
  OPENAI_API_KEY: ""  # Optional
  ANTHROPIC_API_KEY: ""  # Optional

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: botty-app
  namespace: botty
spec:
  # replicas: 1 is correct for personal/single-user deployments.
  # Only increase to 2+ when you need HA and have a load balancer in front.
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: botty-app
  template:
    metadata:
      labels:
        app: botty-app
    spec:
      containers:
      - name: botty-app
        image: botty:latest  # Build and push to your registry
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
          name: http
        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: app-secret
        livenessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - botty-app
              topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: botty-app
  namespace: botty
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 5000
    protocol: TCP
    name: http
  selector:
    app: botty-app

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: botty-app-hpa
  namespace: botty
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: botty-app
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
