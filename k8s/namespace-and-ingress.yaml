apiVersion: v1
kind: Namespace
metadata:
  name: botty

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: botty-ingress
  namespace: botty
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"  # If using cert-manager
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx  # Change if using different ingress controller
  tls:
  - hosts:
    - yourdomain.com  # Change this!
    secretName: botty-tls
  rules:
  - host: yourdomain.com  # Change this!
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: botty-app
            port:
              number: 80

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: botty-app-pdb
  namespace: botty
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: botty-app

---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: botty-quota
  namespace: botty
spec:
  hard:
    requests.cpu: "5"
    requests.memory: "2Gi"
    limits.cpu: "10"
    limits.memory: "4Gi"
    pods: "20"

---
apiVersion: v1
kind: LimitRange
metadata:
  name: botty-limits
  namespace: botty
spec:
  limits:
  - max:
      cpu: "1000m"
      memory: "512Mi"
    min:
      cpu: "100m"
      memory: "128Mi"
    type: Container
  - max:
      cpu: "2000m"
      memory: "1Gi"
    min:
      cpu: "100m"
      memory: "128Mi"
    type: Pod
