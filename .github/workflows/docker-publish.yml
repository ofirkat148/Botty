name: Build and Publish Docker Image

# Publish a container image when code is pushed to main.
# This workflow can later become the base for CD deployments.
on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  docker:
    # GitHub-hosted runner used to build and push the image
    runs-on: ubuntu-latest

    # Required permissions:
    # - contents: read -> allows the workflow to read repository contents
    # - packages: write -> required for pushing images to GHCR
    permissions:
      contents: read
      packages: write

    steps:
      # Step 1: Check out the repository source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Log in to GitHub Container Registry (ghcr.io)
      # GITHUB_TOKEN is automatically provided by GitHub Actions
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step 3: Extract metadata for tagging and labeling the image
      # This creates tags such as:
      # - ghcr.io/<owner>/botty:main
      # - ghcr.io/<owner>/botty:sha-<commit>
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/botty
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-

      # Step 4: Set up Docker Buildx (required for layer cache support)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 5: Build the image and push it to GHCR
      # Cache layers in GHCR to speed up subsequent builds.
      # If the Dockerfile changes or the app breaks at container build time,
      # this job will fail and stop the publish process.
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/botty:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/botty:buildcache,mode=max