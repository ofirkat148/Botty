name: Security Scan

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  trivy-fs-scan:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest

    # Required for checkout + uploading SARIF results into GitHub Security tab
    permissions:
      contents: read
      security-events: write

    steps:
      # Step 1: Check out repository contents
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Run Trivy in filesystem mode
      # We intentionally pin to the currently recommended safe Trivy action version.
      # This scans the repository contents for vulnerabilities, secrets, and misconfigurations.
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true
          vuln-type: "os,library"

      # Step 3: Upload SARIF results so findings appear in GitHub Security tab
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-results.sarif"