<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <title>Botty</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0d0f11" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Botty" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <!-- Blocking script: apply dark background before React hydrates to prevent white flash -->
    <script>
      (function () {
        var t = localStorage.getItem('botty.theme');
        var dark = t === 'dark' || (t === null && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) {
          document.documentElement.style.backgroundColor = '#0d0f11';
          document.documentElement.style.colorScheme = 'dark';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
